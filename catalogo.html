<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Toque Íntimo GS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #70293b;
            --primary-light: #fbeee0;
            --bg: #f8f9fa;
            --text-dark: #2d2d2d;
            --text-muted: #6c757d;
            --success: #25D366;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg); color: var(--text-dark); padding-bottom: 80px; }
        
        /* Header */
        .header { background: white; padding: 20px; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .brand-title { font-size: 24px; font-weight: bold; color: #501926; }
        .brand-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 5px; }

        /* Container */
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }

        /* Categorias */
        .categories-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px; scrollbar-width: none; }
        .categories-bar::-webkit-scrollbar { display: none; }
        .cat-chip { background: white; border: 1px solid #ddd; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .cat-chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Grid de Produtos */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: white; border-radius: 16px; border: 1px solid #eef0f2; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .img-container { width:100%; height:120px; background:#f5f5f5; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#ccc; overflow: hidden; position: relative; cursor: pointer; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s; }
        
        .prod-title { font-size: 14px; font-weight: bold; margin-top: 8px; display: block; }
        .prod-price { font-size: 14px; font-weight: bold; color: var(--primary); margin: 4px 0 2px 0; }
        
        /* Botão Ver Descrição */
        .btn-ver-descricao { font-size: 12px; color: var(--primary); background: none; border: none; cursor: pointer; text-decoration: underline; text-align: left; margin-bottom: 10px; display: inline-flex; align-items: center; gap: 4px; font-weight: bold; width: 100%; padding: 4px 0; }

        /* Variações e Botões */
        .variation-select { width: 100%; padding: 6px; border-radius: 6px; border: 1px solid #ddd; font-size: 11px; margin-bottom: 8px; background: #fff; }
        .btn-add-cart { background-color: var(--primary); color: white; border: none; padding: 8px; border-radius: 8px; font-weight: bold; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; }

        /* Rodapé Fixo */
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 999; }
        .cart-info { display: flex; align-items: center; gap: 10px; }
        .cart-icon-badge { position: relative; font-size: 20px; color: var(--primary); }
        .badge { position: absolute; top: -8px; right: -8px; background: red; color: white; font-size: 10px; font-weight: bold; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .btn-ver-carrinho { background: var(--primary); color: white; padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }

        /* Modais Estrutura Geral */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 450px; border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); position: relative; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .modal-title { font-size: 18px; font-weight: bold; color: var(--primary); }
        .close-btn { font-size: 24px; cursor: pointer; border: none; background: none; color: var(--text-muted); }

        /* Modal Imagem Tela Cheia */
        .modal-image-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
        .modal-image-view img { max-width: 90%; max-height: 80%; border-radius: 8px; object-fit: contain; }
        .modal-image-caption { color: white; margin-top: 15px; font-size: 16px; font-weight: bold; text-align: center; padding: 0 20px; }
        .close-image-btn { position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; background: none; border: none; cursor: pointer; }

        /* Form grupos */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: var(--text-dark); }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Carrinho Itens */
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .cart-item-info { display: flex; flex-direction: column; }
        .cart-item-title { font-size: 14px; font-weight: bold; }
        .cart-item-sub { font-size: 11px; color: var(--text-muted); }
        .cart-item-actions { display: flex; align-items: center; gap: 8px; }
        .btn-qty { background: #eee; border: none; width: 24px; height: 24px; border-radius: 50%; font-weight: bold; cursor: pointer; }

        .btn-action { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 10px; }
        .btn-primary-action { background: var(--primary); color: white; }
        .link-alternativo { text-align: center; display: block; margin-top: 12px; font-size: 13px; color: var(--primary); cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="header">
    <div class="brand-title">Toque Íntimo GS</div>
    <div class="brand-subtitle">Estilo, Conforto e Sofisticação</div>
</div>

<div class="container">
    <div class="categories-bar" id="categorias-lista">
        <span class="cat-chip active" onclick="filtrarCategoria('todas')">Todas</span>
    </div>
    <div class="grid" id="catalogo-grade"></div>
</div>

<div class="bottom-bar">
    <div class="cart-info">
        <div class="cart-icon-badge">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="badge" id="cart-badge-count">0</span>
        </div>
        <div>
            <div style="font-size: 11px; color: var(--text-muted);">Total estimado</div>
            <div style="font-weight: bold; font-size: 15px; color: var(--primary);" id="cart-bottom-total">R$ 0,00</div>
        </div>
    </div>
    <button class="btn-ver-carrinho" onclick="abrirModalCarrinho()">Ver Carrinho</button>
</div>

<!-- ================= MODAIS ================= -->

<!-- Modal Imagem Tela Cheia -->
<div class="modal-image-view" id="modal-foto-tela-cheia" onclick="fecharFotoTelaCheia()">
    <button class="close-image-btn" onclick="fecharFotoTelaCheia()">&times;</button>
    <img id="foto-ampliada" src="" alt="Produto Ampliado">
    <div class="modal-image-caption" id="foto-legenda"></div>
</div>

<!-- Modal de Descrição (Corrigido para Centralizar Sempre) -->
<div class="modal" id="modal-descricao">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title" id="desc-modal-titulo">Descrição</span>
            <button class="close-btn" onclick="fecharModal('modal-descricao')">&times;</button>
        </div>
        <div id="desc-modal-texto" style="font-size: 14px; line-height: 1.6; color: var(--text-dark); white-space: pre-line; padding: 10px 0; max-height: 40vh; overflow-y: auto;"></div>
        <button class="btn-action btn-primary-action" style="margin-top: 15px;" onclick="fecharModal('modal-descricao')">Fechar</button>
    </div>
</div>

<!-- 1. Modal do Carrinho -->
<div class="modal" id="modal-carrinho">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title">Seu Carrinho</span>
            <button class="close-btn" onclick="fecharModal('modal-carrinho')">&times;</button>
        </div>
        <div id="itens-carrinho" style="margin-bottom: 15px; max-height: 45vh; overflow-y: auto;"></div>
        <div style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px; font-size: 16px;">
            <span>Total Geral:</span>
            <span id="modal-cart-total" style="color: var(--primary);">R$ 0,00</span>
        </div>
        <button class="btn-action btn-primary-action" onclick="avancarCarrinho()">Avançar para Identificação</button>
    </div>
</div>

<!-- 2. Modal de Login -->
<div class="modal" id="modal-login">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title">Identificação do Cliente</span>
            <button class="close-btn" onclick="fecharModal('modal-login')">&times;</button>
        </div>
        <div class="form-group">
            <label>Nome de Usuário / E-mail</label>
            <input type="text" class="form-control" id="login-identificador" placeholder="Ex: Maria Silva">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" class="form-control" id="login-senha" placeholder="Sua senha">
        </div>
        <button class="btn-action btn-primary-action" onclick="efetuarLogin()">Entrar e Finalizar</button>
        <span class="link-alternativo" onclick="mostrarCadastro()">Sou novo cliente (Fazer cadastro)</span>
    </div>
</div>

<!-- 3. Modal de Cadastro -->
<div class="modal" id="modal-cadastro">
    <div class="modal-content">
        <div class="modal-header">
            <span class="modal-title">Criar Novo Cadastro</span>
            <button class="close-btn" onclick="fecharModal('modal-cadastro')">&times;</button>
        </div>
        <div style="max-height: 50vh; overflow-y: auto; padding-right: 5px;">
            <div class="form-group">
                <label>Nome Completo *</label>
                <input type="text" class="form-control" id="cad-nome">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>WhatsApp *</label>
                    <input type="tel" class="form-control" id="cad-tel" placeholder="Ex: 11951190804">
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" class="form-control" id="cad-email">
                </div>
            </div>
            <div class="form-group">
                <label>Endereço Completo *</label>
                <input type="text" class="form-control" id="cad-end">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Senha de Acesso *</label>
                    <input type="password" class="form-control" id="cad-senha">
                </div>
                <div class="form-group">
                    <label>Confirmar Senha *</label>
                    <input type="password" class="form-control" id="cad-senha-conf">
                </div>
            </div>
        </div>
        <button class="btn-action btn-primary-action" style="margin-top: 15px;" onclick="efetuarCadastro()">Salvar e Finalizar Pedido</button>
        <span class="link-alternativo" onclick="mostrarLogin()">Já tenho cadastro (Entrar)</span>
    </div>
</div>

<script>
    let produtos = JSON.parse(localStorage.getItem('ti_v4_prod')) || [];
    let clientes = JSON.parse(localStorage.getItem('ti_v4_cli')) || [];
    
    let carrinho = [];
    let clienteLogado = null;
    let categoriaSelecionada = 'todas';

    function carregarCategorias() {
        const lista = document.getElementById('categorias-lista');
        const categoriasUnicas = [...new Set(produtos.map(p => p.categoria).filter(Boolean))];
        categoriasUnicas.forEach(cat => {
            lista.innerHTML += `<span class="cat-chip" id="cat-${cat}" onclick="filtrarCategoria('${cat}')">${cat}</span>`;
        });
    }

    function filtrarCategoria(cat) {
        categoriaSelecionada = cat;
        document.querySelectorAll('.cat-chip').forEach(el => el.classList.remove('active'));
        if (cat === 'todas') {
            document.getElementById('categorias-lista').firstElementChild.classList.add('active');
        } else {
            document.getElementById(`cat-${cat}`).classList.add('active');
        }
        renderizarProdutos();
    }

    function alterarFotoVariacao(idProduto) {
        const produto = produtos.find(p => p.id === idProduto);
        const selectVar = document.getElementById(`var-select-${idProduto}`);
        if(!selectVar) return;
        const variacaoIndex = parseInt(selectVar.value);
        const variacao = produto.variacoes[variacaoIndex];
        const imgElement = document.getElementById(`img-prod-${idProduto}`);
        
        if (imgElement) {
            if (variacao && variacao.foto) {
                imgElement.src = variacao.foto;
                imgElement.alt = `${produto.nome} - Tam: ${variacao.tamanho}`;
            } else {
                const varComFoto = produto.variacoes.find(v => v.foto) || {};
                imgElement.src = varComFoto.foto || "";
            }
        }
    }

    function abrirFotoTelaCheia(idProduto) {
        const imgElement = document.getElementById(`img-prod-${idProduto}`);
        const modal = document.getElementById('modal-foto-tela-cheia');
        const fotoAmpliada = document.getElementById('foto-ampliada');
        const legenda = document.getElementById('foto-legenda');

        if (imgElement && imgElement.src && !imgElement.src.includes('undefined')) {
            fotoAmpliada.src = imgElement.src;
            legenda.innerText = imgElement.alt || "Visualização do Produto";
            modal.style.display = 'flex';
        }
    }

    function fecharFotoTelaCheia() {
        document.getElementById('modal-foto-tela-cheia').style.display = 'none';
    }

    // Função de Abrir Descrição Reformulada
    function abrirDescricao(idProduto) {
        const produto = produtos.find(p => p.id === idProduto);
        if (produto) {
            document.getElementById('desc-modal-titulo').innerText = produto.nome;
            
            if (produto.descricao && produto.descricao.trim() !== "") {
                document.getElementById('desc-modal-texto').innerText = produto.descricao;
            } else {
                document.getElementById('desc-modal-texto').innerText = "Este produto esbanja sofisticação e conforto, perfeito para momentos especiais.";
            }
            
            document.getElementById('modal-descricao').style.display = 'flex';
        }
    }

    function renderizarProdutos() {
        const grade = document.getElementById('catalogo-grade');
        grade.innerHTML = '';

        const produtosFiltrados = categoriaSelecionada === 'todas' 
            ? produtos 
            : produtos.filter(p => p.categoria === categoriaSelecionada);

        const ativos = produtosFiltrados.filter(p => p.variacoes.reduce((acc, v) => acc + v.quantidade, 0) > 0);

        if (!ativos.length) {
            grade.innerHTML = '<p style="grid-column: 1/-1; text-align:center; padding:40px; color:#999;">Nenhum produto em estoque.</p>';
            return;
        }

        ativos.forEach(p => {
            const varComFoto = p.variacoes.find(v => v.foto) || {};
            const menorPreco = Math.min(...p.variacoes.map(v => v.preco));
            
            let itemFotoHtml = varComFoto.foto 
                ? `<img id="img-prod-${p.id}" src="${varComFoto.foto}" alt="${p.nome}" onclick="abrirFotoTelaCheia(${p.id})">`
                : `<i id="img-prod-${p.id}" class="fa-solid fa-image fa-2x" onclick="abrirFotoTelaCheia(${p.id})"></i>`;

            let opcoesVariacao = '';
            p.variacoes.forEach((v, idx) => {
                if (v.quantidade > 0) {
                    opcoesVariacao += `<option value="${idx}">Tamanho: ${v.tamanho} | R$ ${v.preco.toFixed(2)}</option>`;
                }
            });

            grade.innerHTML += `
                <div class="card" id="prod-${p.id}">
                    <div>
                        <div class="img-container">
                            ${itemFotoHtml}
                        </div>
                        <span class="prod-title">${p.nome}</span>
                        <div class="prod-price">R$ ${menorPreco.toFixed(2)}</div>
                        
                        <button class="btn-ver-descricao" onclick="abrirDescricao(${p.id})">
                            <i class="fa-solid fa-circle-info"></i> Ver descrição
                        </button>

                        <select class="variation-select" id="var-select-${p.id}" onchange="alterarFotoVariacao(${p.id})">
                            ${opcoesVariacao}
                        </select>
                    </div>
                    <button class="btn-add-cart" onclick="adicionarAoCarrinho(${p.id})">
                        <i class="fa-solid fa-cart-plus"></i> Adicionar
                    </button>
                </div>
            `;
            
            setTimeout(() => { alterarFotoVariacao(p.id); }, 50);
        });
    }

    function adicionarAoCarrinho(idProduto) {
        const produto = produtos.find(p => p.id === idProduto);
        const selectVar = document.getElementById(`var-select-${idProduto}`);
        const variacaoIndex = parseInt(selectVar.value);
        const variacao = produto.variacoes[variacaoIndex];
        const itemExistente = carrinho.find(item => item.idProduto === idProduto && item.variacaoIndex === variacaoIndex);

        if (itemExistente) {
            if (itemExistente.qtd < variacao.quantidade) itemExistente.qtd++;
            else { alert("Limite de estoque atingido!"); return; }
        } else {
            carrinho.push({
                idProduto: idProduto,
                nome: produto.nome,
                variacaoIndex: variacaoIndex,
                tamanho: variacao.tamanho,
                preco: variacao.preco,
                qtd: 1
            });
        }
        atualizarInterfaceCarrinho();
    }

    function alterarQtdCarrinho(index, alteracao) {
        const item = carrinho[index];
        const produtoOriginal = produtos.find(p => p.id === item.idProduto);
        const variacaoOriginal = produtoOriginal.variacoes[item.variacaoIndex];

        if (alteracao === 1) {
            if (item.qtd < variacaoOriginal.quantidade) item.qtd++;
            else alert("Limite máximo de estoque atingido.");
        } else if (alteracao === -1) {
            item.qtd--;
            if (item.qtd <= 0) carrinho.splice(index, 1);
        }
        atualizarInterfaceCarrinho();
    }

    function atualizarInterfaceCarrinho() {
        const badge = document.getElementById('cart-badge-count');
        const barTotal = document.getElementById('cart-bottom-total');
        let totalQtd = carrinho.reduce((acc, item) => acc + item.qtd, 0);
        let valorTotal = carrinho.reduce((acc, item) => acc + (item.preco * item.qtd), 0);
        badge.innerText = totalQtd;
        barTotal.innerText = `R$ ${valorTotal.toFixed(2)}`;
    }

    function abrirModalCarrinho() {
        if (!carrinho.length) { alert("Seu carrinho está vazio!"); return; }
        const containerItens = document.getElementById('itens-carrinho');
        containerItens.innerHTML = '';
        let valorTotal = 0;

        carrinho.forEach((item, index) => {
            const subtotal = item.preco * item.qtd;
            valorTotal += subtotal;
            containerItens.innerHTML += `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <span class="cart-item-title">${item.nome}</span>
                        <span class="cart-item-sub">Tamanho: ${item.tamanho} | R$ ${item.preco.toFixed(2)}</span>
                    </div>
                    <div class="cart-item-actions">
                        <button class="btn-qty" onclick="alterarQtdCarrinho(${index}, -1)">-</button>
                        <span style="font-weight:bold; width:15px; text-align:center;">${item.qtd}</span>
                        <button class="btn-qty" onclick="alterarQtdCarrinho(${index}, 1)">+</button>
                    </div>
                </div>
            `;
        });
        document.getElementById('modal-cart-total').innerText = `R$ ${valorTotal.toFixed(2)}`;
        document.getElementById('modal-carrinho').style.display = 'flex';
    }

    function fecharModal(id) { document.getElementById(id).style.display = 'none'; }
    function avancarCarrinho() { fecharModal('modal-carrinho'); if (clienteLogado) finalizarPedidoWhatsApp(); else document.getElementById('modal-login').style.display = 'flex'; }
    function mostrarCadastro() { fecharModal('modal-login'); document.getElementById('modal-cadastro').style.display = 'flex'; }
    function mostrarLogin() { fecharModal('modal-cadastro'); document.getElementById('modal-login').style.display = 'flex'; }

    function efetuarLogin() {
        const identificador = document.getElementById('login-identificador').value.trim();
        const senha = document.getElementById('login-senha').value;
        const cliEncontrado = clientes.find(c => c.nome.toLowerCase() === identificador.toLowerCase() && c.senha === senha);

        if (cliEncontrado) {
            clienteLogado = cliEncontrado;
            fecharModal('modal-login');
            finalizarPedidoWhatsApp();
        } else {
            alert("Dados incorretos!");
        }
    }

    function efetuarCadastro() {
        const nome = document.getElementById('cad-nome').value.trim();
        const tel = document.getElementById('cad-tel').value.trim();
        const end = document.getElementById('cad-end').value.trim();
        const senha = document.getElementById('cad-senha').value;

        if (!nome || !tel || !end || !senha) { alert("Preencha todos os campos obrigatórios!"); return; }

        let novoId = clientes.length > 0 ? Math.max(...clientes.map(c => c.id)) + 1 : 1;
        const codigoFormatado = `CLI${String(novoId).padStart(4, '0')}`;

        const novoCliente = { id: novoId, codigo: codigoFormatado, nome: nome, telefone: tel, endereco: end, senha: senha };
        clientes.push(novoCliente);
        localStorage.setItem('ti_v4_cli', JSON.stringify(clientes));
        clienteLogado = novoCliente;

        fecharModal('modal-cadastro');
        finalizarPedidoWhatsApp();
    }

    function finalizarPedidoWhatsApp() {
        let totalGeral = 0;
        let listaProdutosTexto = '';
        carrinho.forEach(item => {
            const subtotal = item.preco * item.qtd;
            totalGeral += subtotal;
            listaProdutosTexto += `• ${item.nome} (Tam: ${item.tamanho}) - ${item.qtd}x R$ ${item.preco.toFixed(2)} = R$ ${subtotal.toFixed(2)}\n`;
        });

        const linkDoCatalogo = window.location.href;
        const textoMensagem = encodeURIComponent(
            `*Toque Íntimo GS - NOVO PEDIDO* 🎉\n\n` +
            `*DADOS DO CLIENTE:*\n` +
            `• *Código:* ${clienteLogado.codigo}\n` +
            `• *Nome:* ${clienteLogado.nome}\n` +
            `• *Endereço:* ${clienteLogado.endereco}\n\n` +
